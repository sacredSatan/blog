# Site settings
title: "sacredSatan/blog"
description: > 
  sacredSatan's Blog
author: Nihar Patel
email: iamniharpatel@gmail.com
twitter_username: iamNiharPatel
github_username: sacredSatan

baseurl: "/blog" # the subpath of your site, e.g. /blog
url: "https://sacredSatan.github.io" # the base hostname & protocol for your site

disqus_id: sacredsatan-blog

# Build settings
include: [_pages]
markdown: kramdown
permalink: /:year/:month/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

sass:
    style: compressed

exclude: [vendor]

